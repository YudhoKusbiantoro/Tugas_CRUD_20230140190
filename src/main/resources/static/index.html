<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD KTP - Manajemen Data KTP</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">
        <h1>📋 Manajemen Data KTP</h1>

        <!-- Form Section -->
        <div class="form-container">
            <h2 id="formTitle">Tambah Data KTP</h2>
            <form id="ktpForm">
                <input type="hidden" id="id" name="id">

                <div class="form-group">
                    <label for="nomorktp">Nomor KTP *</label>
                    <input type="text" id="nomorktp" name="nomorktp" placeholder="Masukkan 16 digit nomor KTP"
                        maxlength="16" required>
                </div>

                <div class="form-group">
                    <label for="namalengkap">Nama Lengkap *</label>
                    <input type="text" id="namalengkap" name="namalengkap" placeholder="Masukkan nama lengkap" required>
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat *</label>
                    <textarea id="alamat" name="alamat" rows="3" placeholder="Masukkan alamat lengkap"
                        required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tanggallahir">Tanggal Lahir *</label>
                        <input type="date" id="tanggallahir" name="tanggallahir" required>
                    </div>

                    <div class="form-group">
                        <label for="jeniskelamin">Jenis Kelamin *</label>
                        <select id="jeniskelamin" name="jeniskelamin" required>
                            <option value="">-- Pilih Jenis Kelamin --</option>
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="btnSubmit">
                        💾 Simpan
                    </button>
                    <button type="button" class="btn btn-secondary" id="btnReset">
                        🔄 Reset
                    </button>
                    <button type="button" class="btn btn-danger" id="btnCancel" style="display: none;">
                        ❌ Batal Edit
                    </button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="table-container">
            <h2>📊 Daftar Data KTP</h2>
            <button class="btn btn-success" id="btnRefresh">
                🔄 Refresh Data
            </button>

            <table id="ktpTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nomor KTP</th>
                        <th>Nama Lengkap</th>
                        <th>Alamat</th>
                        <th>Tanggal Lahir</th>
                        <th>Jenis Kelamin</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data akan dimuat di sini oleh JavaScript -->
                </tbody>
            </table>

            <div id="loading" style="display: none; text-align: center; padding: 20px;">
                ⏳ Loading...
            </div>

            <div id="noData" style="display: none; text-align: center; padding: 20px; color: #999;">
                Belum ada data KTP
            </div>
        </div>
    </div>

    <!-- Notification/Alert -->
    <div id="notification" class="notification">
        <span id="notifMessage"></span>
        <button id="notifClose" class="notif-close">&times;</button>
    </div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
</body>

</html>
